name: Daily video draft

on:
  schedule:
    - cron: '0 14 * * *'   # 14:00 UTC daily — adjust to taste
  workflow_dispatch: {}     # manual "run now" button in the Actions tab

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false   # one topic failing shouldn't cancel the others
      matrix:
        topic:
          - "a surprising fact about the deep ocean"
          - "the history of a common everyday object"
          - "a weird quirk of human psychology"
          # add/remove lines here — one line = one video, all rendered in parallel
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        run: python main.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          VIDEO_TOPIC: ${{ matrix.topic }}
